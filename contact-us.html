<!DOCTYPE html>
<html>

<head>
    <title>Contact - Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .container {
            width: 950px;
            margin: 80px auto;
            color: black;
            line-height: 1.5;
            padding-top: 30px;
        }

        .text-center {
            text-align: center;
        }

        .content {
            display: flex;
            margin-top: 40px;
        }

        .icon {
            background-color: chocolate;
            border-radius: 30px;
            padding: 15px;
            vertical-align: top;
        }

        .contact-info {
            display: inline-block;
            padding: 4px 20px 0px 20px;
        }

        .address-line {
            margin-top: 40px;
        }

        .col-1 {
            width: 530px;
        }

        .col-2 {
            flex: 1 1 auto;
            background-color: white;
        }

        .form-container {
            color: #000;
            padding: 30px;
        }

        .contact-info-title {
            color: rgba(20, 2, 0, 0.8);
            font-weight: bold;
        }

        .form-row {
            padding-bottom: 30px;
        }

        .form-field {
            width: 100%;
            border: none;
            border-bottom: 1px solid #000;
        }

        .topspace {
            margin-top: 150px;
        }

        .send-btn {
            border: 0px;
            padding: 12px 26px;
            background-color: rgba(20, 2, 0, 0.8);
            color: white;
        }

        @media all and (max-width: 1024px) {
            .container {
                width: auto;
                padding: 100px;
            }

            .col-1 {
                width: 360px;
            }
        }

        @media all and (max-width: 700px) {
            .content {
                display: block;
            }

            .col-2 {
                margin-top: 40px;
            }

            .col-1 {
                width: 100%;
            }
        }

        @media all and (max-width: 500px) {
            .container {
                padding: 10px;
            }
        }
    </style>
    <script src="js/components.js"></script>
</head>

<body>
    <section class="generic-banner relative">

    </section>
    <header-component></header-component>

    <div class="topspace"></div>
    <div class="container">
        <div class="text-center">
            <h1>Contact Us</h1>

        </div>
        <div class="content">
            <div class="col-1">
                <div class="address-line">
                    <img alt="location" src="img/marker.png" class="icon">
                    <div class="contact-info">
                        <div class="contact-info-title">Address</div>
                        <div>1002 West 5th Ave,</div>
                        <div>Alaska, New York,</div>
                        <div>55060.</div>
                    </div>
                </div>
                <div class="address-line">
                    <img alt="location" src="img/phone.png" class="icon">
                    <div class="contact-info">
                        <div class="contact-info-title">Phone</div>
                        <div>12523-4566-8954-8956.</div>
                    </div>
                </div>
                <div class="address-line">
                    <img alt="location" src="img/mail.png" class="icon">
                    <div class="contact-info">
                        <div class="contact-info-title">Email</div>
                        <div>contactemail@gmail.com</div>
                    </div>
                </div>
            </div>
            <div class="col-2">
                <form>
                    <div class="form-container">
                        <h2>Send Message</h2>
                        <div class="form-row">
                            <label>Full Name</label>
                            <div>
                                <input type="text" class="form-field">
                            </div>
                        </div>
                        <div class="form-row">
                            <label>Email</label>
                            <div>
                                <input type="text" class="form-field">
                            </div>
                        </div>
                        <div class="form-row">
                            <label>Type your message...</label>
                            <div>
                                <input type="text" class="form-field">
                            </div>
                        </div>
                        <input type="button" class="send-btn" value="Send">
                    </div>
                </form>
            </div>
        </div>
    </div>
    <footer-component></footer-component>
</body>

</html>
